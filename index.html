<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <div>
                <h1>📋 Task Manager</h1>
                <p class="subtitle">Stay organized and productive</p>
            </div>
            <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle day/night theme">🌙 Night</button>
        </header>

        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="taskInput" 
                    placeholder="Add a new task..." 
                    class="task-input"
                >
                <label class="datetime-field" for="dueDateTime">
                    <span>Select time and date</span>
                    <input 
                        type="datetime-local" 
                        id="dueDateTime" 
                        class="due-datetime-input"
                        title="Select time and date"
                    >
                </label>
                <button id="addBtn" class="btn btn-add">Add Task</button>
            </div>
            <label class="notification-toggle">
                <input type="checkbox" id="notificationsEnabled" checked>
                <span>🔔 Enable Notifications</span>
            </label>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <div class="stats">
            <span class="stat-item">
                Total: <strong id="totalCount">0</strong>
            </span>
            <span class="stat-item">
                Completed: <strong id="completedCount">0</strong>
            </span>
        </div>

        <div id="notificationContainer" class="notification-container"></div>

        <ul id="taskList" class="task-list"></ul>

        <div class="empty-state" id="emptyState">
            <p>✨ No tasks yet. Add one to get started!</p>
        </div>

        <button id="clearCompleted" class="btn btn-clear">Clear Completed Tasks</button>

        <footer class="social-footer">
            <a id="githubLink" class="social-btn github" href="https://github.com/joseyluvers" target="_blank" rel="noopener noreferrer" title="GitHub">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 17.07 3.633 16.7 3.633 16.7c-1.087-.744.084-.729.084-.729 1.205.084 1.84 1.236 1.84 1.236 1.07 1.835 2.809 1.305 3.495.997.108-.775.418-1.305.76-1.606-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.468-2.381 1.235-3.221-.123-.303-.535-1.523.117-3.176 0 0 1.007-.322 3.3 1.23.957-.266 1.98-.399 3-.405 1.02.006 2.043.139 3 .405 2.29-1.552 3.295-1.23 3.295-1.23.655 1.653.243 2.873.12 3.176.77.84 1.235 1.911 1.235 3.221 0 4.61-2.807 5.625-5.48 5.921.43.372.81 1.102.81 2.222 0 1.606-.015 2.898-.015 3.293 0 .319.216.694.825.576C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
                <span>GitHub</span>
            </a>

            <a id="linkedinLink" class="social-btn linkedin" href="https://www.linkedin.com/in/ayinmode-joseph-seye" target="_blank" rel="noopener noreferrer" title="LinkedIn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M4.98 3.5C4.98 4.88 3.88 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1 4.98 2.12 4.98 3.5zM.2 8h4.6V24H.2zM8.98 8h4.4v2.14h.06c.61-1.16 2.1-2.38 4.32-2.38 4.62 0 5.48 3.04 5.48 6.99V24h-4.6v-7.52c0-1.79-.03-4.09-2.49-4.09-2.49 0-2.87 1.94-2.87 3.96V24H8.98V8z"/></svg>
                <span>LinkedIn</span>
            </a>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
